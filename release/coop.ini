; th07_coop.dll configuration.
;
; You normally DON'T edit this by hand — launcher.exe rewrites it from the
; dialog every time you launch (Host / Connect / Local Co-op). It's here so the
; settings exist before the first run and so you can tweak the extras below.

[coop]
; proximity_fade: when 1 (default), the OTHER player fades out as they overlap
; you, so your own character stays readable in a tight spot. Set 0 to disable.
proximity_fade = 1
; disable_demo: when 1 (default), the title screen never starts its attract-mode
; demo replay (which would otherwise kick in after ~15s idle — bad while waiting
; for a netplay peer). Set 0 to restore the vanilla demo.
disable_demo = 1
; p2_face_diag: developer probe for the open §8b "correct bomb-declaration face
; for a different-character P2" goal. Default 0. When 1, a different-char P2's
; stage start loads its face anm into a spare slot, writes the 0x400-corruption
; fingerprint to coop_log.txt ([face-diag] lines), then fully restores + frees —
; it does NOT change what you see (the wrong face is still suppressed). Leave at 0
; unless you are gathering data to implement the real per-player portrait.
p2_face_diag = 0
; debug_keys: when 1, the developer F-key hotkeys (F2-F12: spawn/despawn P2, swap
; P2 character/shot, toggle killable/HP-scaling, revive, …) are live. Default 0 so
; an ordinary player can't accidentally press one and desync a net game. Turn on
; only if you know what they do.
debug_keys = 0
; force_replay_p2: replay a co-op replay recorded BEFORE the auto-tag fix (P2's input
; is already saved in the file; only the "spawn P2" tag was missing). -1 = off (default).
; 0..5 = spawn P2 with this selection: 0 ReimuA 1 ReimuB 2 MarisaA 3 MarisaB 4 SakuyaA
; 5 SakuyaB. Use the SAME character as P1 for a stable, accurate playback — a different
; character uses the unstable P2 anm overlay (can crash on shot). Leave -1 for normal play.
force_replay_p2 = -1
; replay_fpu_pin: a NETPLAY co-op replay was recorded with the x87 FPU pinned to 24-bit/
; round-nearest every frame (the netplay determinism fix). On playback the sim must run in
; that same FP environment or it drifts — the player still tracks the recorded input, but
; trig-driven aimed enemy shots diverge and the run desyncs after a while. -1 = AUTO
; (default): pin only if the replay's header says it was recorded under netplay. New netplay
; replays carry that flag, so AUTO just works. 0 = never pin. 1 = ALWAYS pin — use this to
; play back an OLD netplay replay made before the header flag existed (e.g. a pre-2026-06-19
; .rpy). Leave -1 for normal play; solo/local replays are never pinned (recorded native).
replay_fpu_pin = -1
; Local co-op P2 keys (only used when [net] enabled = 0). Each is a single letter/
; digit, a name (SPACE, COMMA, PERIOD, SEMICOLON, SLASH, LBRACKET, RBRACKET, SHIFT,
; CTRL, ALT, ENTER, TAB, UP, DOWN, LEFT, RIGHT), or a raw VK number (e.g. 0xBC).
; Blank/omitted = keep the default. Defaults put FOCUS+BOMB on the adjacent O/P pair.
p2_up    = W
p2_down  = S
p2_left  = A
p2_right = D
p2_shoot = SPACE
p2_focus = O
p2_bomb  = P

[net]
; enabled: 0 = local-keyboard co-op (P2 = WASD move, Space shoot, O focus, P bomb;
;          remap above). 1 = network play.
; The launcher sets these; shown here for reference.
enabled = 0
; role  = host  -> you listen for a guest (you are P1)
; role  = guest -> you dial the host (you are P2)
role  = host
; peer  : the HOST's IP address (guest fills this in)
peer  = 127.0.0.1
; port  : the host's game port. Host listens on it; guest sends to it. Same on both.
port  = 47000
; local : the guest's local UDP port (host ignores it).
local = 47001
; delay : input-delay frames (0-10). Higher = smoother but laggier. Host's value
;         is pushed to the guest, so only the host's matters.
delay = 2
; seed  : RNG start seed. The host mints a fresh one each launch and pushes it to
;         the guest, so this is informational only.
seed  = 0x1234
